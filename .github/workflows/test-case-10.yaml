name: test-case-10
permissions:
  contents: read
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ["gh-proxy-runner"]
    strategy:
      matrix:
        job-name:
          - low-cpu-1
          - low-cpu-2
          - low-cpu-3
          - high-cpu
          - low-cpu-4
          - low-cpu-5
          - low-cpu-6
          - low-cpu-7
          - low-cpu-8
          - low-cpu-9
    name: ${{ matrix.job-name }}
    steps:
      - name: Report resources
        run: |
          # Detect CPU limit from cgroups
          if [ -f /sys/fs/cgroup/cpu.max ]; then
            read QUOTA PERIOD < /sys/fs/cgroup/cpu.max
            if [ "$QUOTA" != "max" ]; then
              CPUS=$(awk "BEGIN {printf \"%.1f\", $QUOTA / $PERIOD}")
            else
              CPUS=$(nproc)
            fi
          elif [ -f /sys/fs/cgroup/cpu/cpu.cfs_quota_us ]; then
            QUOTA=$(cat /sys/fs/cgroup/cpu/cpu.cfs_quota_us)
            PERIOD=$(cat /sys/fs/cgroup/cpu/cpu.cfs_period_us)
            if [ "$QUOTA" != "-1" ]; then
              CPUS=$(awk "BEGIN {printf \"%.1f\", $QUOTA / $PERIOD}")
            else
              CPUS=$(nproc)
            fi
          else
            CPUS=$(nproc)
          fi

          # Detect memory limit from cgroups
          if [ -f /sys/fs/cgroup/memory.max ]; then
            MEM_BYTES=$(cat /sys/fs/cgroup/memory.max)
            if [ "$MEM_BYTES" = "max" ]; then
              MEM_DISPLAY="unlimited"
            else
              MEM_DISPLAY="$(awk "BEGIN {printf \"%.1f GB\", $MEM_BYTES / 1073741824}")"
            fi
          elif [ -f /sys/fs/cgroup/memory/memory.limit_in_bytes ]; then
            MEM_BYTES=$(cat /sys/fs/cgroup/memory/memory.limit_in_bytes)
            MEM_DISPLAY="$(awk "BEGIN {printf \"%.1f GB\", $MEM_BYTES / 1073741824}")"
          else
            MEM_DISPLAY="unknown"
          fi

          RUNNER_NAME=$(hostname)
          JOB_NAME="${{ matrix.job-name }}"

          # Determine expected resources based on job name
          if echo "$JOB_NAME" | grep -q "^high-cpu"; then
            EXPECTED_CPUS="4.0"
            EXPECTED_MEM="8.0 GB"
          else
            EXPECTED_CPUS="1.0"
            EXPECTED_MEM="2.0 GB"
          fi

          # Validate
          if [ "$CPUS" = "$EXPECTED_CPUS" ]; then
            CPU_STATUS="pass"
          else
            CPU_STATUS="FAIL (expected $EXPECTED_CPUS)"
          fi
          if [ "$MEM_DISPLAY" = "$EXPECTED_MEM" ]; then
            MEM_STATUS="pass"
          else
            MEM_STATUS="FAIL (expected $EXPECTED_MEM)"
          fi

          # Write results file for the summary job
          echo "${JOB_NAME}|${RUNNER_NAME}|${CPUS}|${EXPECTED_CPUS}|${MEM_DISPLAY}|${EXPECTED_MEM}|${CPU_STATUS}|${MEM_STATUS}" \
            > "results-${{ matrix.job-name }}.txt"

          echo "Job: $JOB_NAME | Runner: $RUNNER_NAME | CPUs: $CPUS | Memory: $MEM_DISPLAY"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.job-name }}
          path: results-${{ matrix.job-name }}.txt

  summary:
    needs: [run]
    runs-on: ubuntu-latest
    name: summary
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          merge-multiple: true

      - name: Build consolidated summary
        run: |
          PASS_COUNT=0
          FAIL_COUNT=0

          # Start building the summary table
          {
            echo "## Resource Validation Summary"
            echo ""
            echo "| Job | Runner | CPUs | Expected CPUs | Memory | Expected Memory | CPU | Mem |"
            echo "|-----|--------|------|---------------|--------|-----------------|-----|-----|"
          } > summary.md

          for f in results-*.txt; do
            IFS='|' read -r JOB RUNNER CPUS EXP_CPUS MEM EXP_MEM CPU_ST MEM_ST < "$f"

            # Format status with emoji
            if [ "$CPU_ST" = "pass" ]; then
              CPU_ICON="pass"
            else
              CPU_ICON="**$CPU_ST**"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
            if [ "$MEM_ST" = "pass" ]; then
              MEM_ICON="pass"
            else
              MEM_ICON="**$MEM_ST**"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi

            echo "| ${JOB} | \`${RUNNER}\` | ${CPUS} | ${EXP_CPUS} | ${MEM} | ${EXP_MEM} | ${CPU_ICON} | ${MEM_ICON} |" >> summary.md
            PASS_COUNT=$((PASS_COUNT + 1))
          done

          # Add verdict
          {
            echo ""
            if [ "$FAIL_COUNT" -eq 0 ]; then
              echo "**Result: ALL ${PASS_COUNT} JOBS PASSED**"
            else
              echo "**Result: ${FAIL_COUNT} CHECK(S) FAILED out of ${PASS_COUNT} jobs**"
            fi
          } >> summary.md

          cat summary.md >> "$GITHUB_STEP_SUMMARY"
          cat summary.md

          # Fail the job if any checks failed
          if [ "$FAIL_COUNT" -ne 0 ]; then
            exit 1
          fi
